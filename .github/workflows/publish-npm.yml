# Publishes to https://www.npmjs.com/package/olostep
#
# Setup (one time):
#   - Repo → Settings → Secrets → Actions: add NPM_TOKEN
#     (npmjs.com → Access Tokens → Granular or Automation, with publish for package "olostep")
#
# Release:
#   1. Bump "version" in package.json on main (must match the tag, without the "v")
#   2. git tag v0.1.3 && git push origin v0.1.3
#   Or: Actions → "Publish to npm" → Run workflow (after version bump is on the branch you run from)

name: Publish to npm

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      # npm ci installs exactly what's in package-lock.json (commit the lockfile when deps change).
      - run: npm ci

      # Integration tests need OLOSTEP_API_KEY; typecheck + prepublishOnly build gate the release.
      - run: npm run check:types

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
